<a id="destination-link" href="https://docs.hagicode.com/" class="astro-gxdxsaan">https://docs.hagicode.com/</a> </p> <p class="status astro-gxdxsaan" id="status">如果没有跳转，请点击之后自动跳转</p> <noscript> <p class="status astro-gxdxsaan">当前入口页需要浏览器 JavaScript 才能自动跳转，你也可以直接点击上方链接继续访问。</p> </noscript> </main> <script>(function(){const fallbackUrl = "https://docs.hagicode.com/";
const routePath = "/go";
const platformParam = "platform";
const targetParam = "target";
const supportedPlatforms = ["zhihu","wechat","cnblogs","juejin","oschina","aliyun-community","tencent-cloud-community","csdn","segmentfault","toutiao","infoq"];

      const message = document.getElementById('message');
      const destinationLink = document.getElementById('destination-link');
      const status = document.getElementById('status');
      const reservedParams = new Set([platformParam, targetParam]);

      function ensureTrailingSlash(pathname) {
        return pathname.endsWith('/') ? pathname : `${pathname}/`;
      }

      function buildRedirectUrl(baseUrl, sourceUrl) {
        const redirectUrl = new URL(baseUrl);

        sourceUrl.searchParams.forEach((value, key) => {
          if (!reservedParams.has(key)) {
            redirectUrl.searchParams.append(key, value);
          }
        });

        return redirectUrl;
      }

      function normalizeTargetPath(targetPath) {
        if (typeof targetPath !== 'string') {
          throw new Error('Traffic-entry target must be a string');
        }

        const trimmed = targetPath.trim();
        if (!trimmed) {
          throw new Error('Traffic-entry target is required');
        }

        if (/^[a-z]+:/i.test(trimmed) || trimmed.startsWith('//')) {
          throw new Error('Traffic-entry target must be a site-relative path');
        }

        const normalized = trimmed.startsWith('/') ? trimmed : `/${trimmed}`;
        const url = new URL(normalized, fallbackUrl);
        const pathname = ensureTrailingSlash(url.pathname);

        if (!pathname.startsWith('/blog/')) {
          throw new Error('Traffic-entry target must stay within /blog/');
        }

        if (pathname.includes('..')) {
          throw new Error('Traffic-entry target cannot contain traversal segments');
        }

        return pathname;
      }

      function hasTrafficEntryParams(url) {
        return url.searchParams.has(platformParam) || url.searchParams.has(targetParam);
      }

      function createFallbackResolution(url, hasParams) {
        const redirectUrl = buildRedirectUrl(fallbackUrl, url);

        return {
          valid: false,
          hasTrafficEntryParams: hasParams,
          redirectUrl: redirectUrl.toString(),
        };
      }

      function resolveTrafficEntryRequest(input) {
        const url = input instanceof URL ? input : new URL(String(input));
        const platformId = url.searchParams.get(platformParam);
        const rawTarget = url.searchParams.get(targetParam);

        if (!hasTrafficEntryParams(url)) {
          return createFallbackResolution(url, false);
        }

        if (!platformId || !supportedPlatforms.includes(platformId) || !rawTarget) {
          return createFallbackResolution(url, true);
        }

        try {
          const targetPath = normalizeTargetPath(rawTarget);
          const redirectUrl = buildRedirectUrl(new URL(targetPath, url.origin), url);

          return {
            valid: true,
            hasTrafficEntryParams: true,
            platformId,
            targetPath,
            redirectUrl: redirectUrl.toString(),
          };
        } catch {
          return createFallbackResolution(url, true);
        }
      }

      const resolution = resolveTrafficEntryRequest(new URL(window.location.href));
      const destinationUrl = resolution.redirectUrl;

      destinationLink.href = destinationUrl;
      destinationLink.textContent = destinationUrl;
      status.textContent = '如果没有跳转，请点击之后自动跳转';

      if (!resolution.valid) {

          : '缺少可识别的流量入口参数，正在返回 docs.hagicode.com 主站。';

      }
