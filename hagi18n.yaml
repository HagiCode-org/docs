localesRoot: src/i18n/locales
repoRoot: .
baseLocale: en-US
targetLocales:
  - zh-CN
  - zh-Hant
  - fr-FR
  - it-IT
  - de-DE
  - es-ES
  - bg-BG
  - cs-CZ
  - da-DK
  - nl-NL
  - fi-FI
  - el-GR
  - hu-HU
  - id-ID
  - ja-JP
  - ko-KR
  - nb-NO
  - pl-PL
  - pt-BR
  - pt-PT
  - ro-RO
  - ru-RU
  - es-419
  - sv-SE
  - th-TH
  - tr-TR
  - uk-UA
  - vi-VN
doctor:
  excludedDirectories:
    - .astro
    - .git
    - .tmp
    - build
    - coverage
    - dist
    - node_modules
    - public
  excludedPathPrefixes:
    - src/content/docs/
    - src/i18n/generated/
  textFileExtensions:
    - .astro
    - .css
    - .js
    - .jsx
    - .json
    - .mjs
    - .ts
    - .tsx
    - .yaml
    - .yml
  allowlist:
    legacy-language-change-call: []
    legacy-locale-path:
      - src/pages/blog/rss.en.xml.ts
      - src/lib/i18n.ts
    legacy-ui-language-literal:
      - astro.config.mjs
      - src/lib/blog-rss.ts
      - src/lib/i18n.ts
      - src/lib/i18n.test.ts
    legacy-ui-language-union:
      - src/lib/i18n.ts
