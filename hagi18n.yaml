localesRoot: src/i18n/locales
repoRoot: .
baseLocale: en-US
targetLocales:
  - zh-CN
  - zh-Hant
  - ja-JP
  - ko-KR
  - de-DE
  - fr-FR
  - es-ES
  - pt-BR
  - ru-RU
doctor:
  excludedDirectories:
    - .astro
    - .git
    - .tmp
    - build
    - coverage
    - dist
    - node_modules
    - public
  excludedPathPrefixes:
    - src/content/docs/
    - src/i18n/generated/
  textFileExtensions:
    - .astro
    - .css
    - .js
    - .jsx
    - .json
    - .mjs
    - .ts
    - .tsx
    - .yaml
    - .yml
  allowlist:
    legacy-language-change-call: []
    legacy-locale-path:
      - src/pages/en/index.astro
      - src/pages/blog/rss.en.xml.ts
      - src/lib/i18n.ts
      - tests/language-select-persistence.test.mjs
      - tests/release-notes-routing.test.mjs
    legacy-ui-language-literal:
      - astro.config.mjs
      - src/lib/blog-rss.ts
      - src/lib/i18n.ts
      - src/lib/i18n.test.ts
      - src/pages/en/index.astro
      - tests/language-select-persistence.test.mjs
    legacy-ui-language-union:
      - src/lib/i18n.ts
